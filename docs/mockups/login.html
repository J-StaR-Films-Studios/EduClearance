<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Sign In - EduClearance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: { DEFAULT: '#FAF9F6', card: '#FFFFFF', secondary: '#F5F2EB' },
            navy: { 800: '#1E293B', 900: '#0F172A' },
            emerald: { 600: '#059669' },
            slate: { 500: '#64748B' }
          },
          fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-background text-navy-800 font-sans min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white p-8 rounded-2xl border border-background-secondary shadow-sm space-y-6">
    <!-- Brand / Header -->
    <div class="text-center space-y-2">
      <div class="inline-flex bg-navy-900 text-white px-3 py-1.5 rounded-xl font-display font-bold text-lg tracking-wider mb-2">EC</div>
      <h1 class="font-display text-2xl font-bold text-navy-900">Sign In to EduClearance</h1>
      <p class="text-slate-500 text-sm">Verify clearances and manage unresolved student obligations</p>
    </div>

    <!-- Forms (Tabs could change role context) -->
    <form action="dashboard.html" class="space-y-4">
      <div class="space-y-1">
        <label for="email" class="text-xs font-semibold text-navy-800 block">Official School Email</label>
        <input type="email" id="email" required placeholder="proprietor@yourschool.com" class="w-full bg-background border border-background-secondary rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-navy-800">
      </div>
      <div class="space-y-1">
        <div class="flex items-center justify-between">
          <label for="password" class="text-xs font-semibold text-navy-800 block">Password</label>
          <a href="#" class="text-xs text-slate-500 hover:underline">Forgot password?</a>
        </div>
        <input type="password" id="password" required placeholder="••••••••" class="w-full bg-background border border-background-secondary rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-navy-800">
      </div>

      <!-- Login Action -->
      <button type="submit" class="w-full bg-navy-900 text-white font-medium py-3 rounded-lg hover:bg-navy-800 transition text-sm">
        Sign In
      </button>
    </form>

    <div class="border-t border-background-secondary pt-4 text-center text-xs space-y-2">
      <p class="text-slate-500">
        New school owner? <a href="register.html" class="text-navy-900 font-semibold hover:underline">Register an account</a>
      </p>
      <p class="text-slate-500">
        Need to claim your school? <a href="claim-school.html" class="text-navy-900 font-semibold hover:underline">Claim pre-seeded profile</a>
      </p>
      <p class="text-slate-400">
        Are you a Platform Admin? <a href="admin.html" class="text-slate-500 font-semibold hover:underline">Go to Admin Login</a>
      </p>
    </div>
  </div>
</body>
</html>
