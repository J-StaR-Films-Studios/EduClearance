<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Sign Up - EduClearance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: { DEFAULT: '#FAF9F6', card: '#FFFFFF', secondary: '#F5F2EB' },
            navy: { 800: '#1E293B', 900: '#0F172A' },
            slate: { 500: '#64748B' }
          },
          fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-background text-navy-800 font-sans min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white p-8 rounded-2xl border border-background-secondary shadow-sm space-y-6">
    <!-- Brand / Header -->
    <div class="text-center space-y-2">
      <div class="inline-flex bg-navy-900 text-white px-3 py-1.5 rounded-xl font-display font-bold text-lg tracking-wider mb-2">EC</div>
      <h1 class="font-display text-2xl font-bold text-navy-900">Create Proprietor Account</h1>
      <p class="text-slate-500 text-sm">Register to claim and verify clearances</p>
    </div>

    <!-- Registration Form -->
    <form action="claim-school.html" class="space-y-4">
      <div class="space-y-1">
        <label for="name" class="text-xs font-semibold text-navy-800 block">Full Name</label>
        <input type="text" id="name" required placeholder="e.g. Chief Mrs. Alabi" class="w-full bg-background border border-background-secondary rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-navy-800">
      </div>
      <div class="space-y-1">
        <label for="email" class="text-xs font-semibold text-navy-800 block">Official Email</label>
        <input type="email" id="email" required placeholder="proprietor@yourschool.com" class="w-full bg-background border border-background-secondary rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-navy-800">
      </div>
      <div class="space-y-1">
        <label for="phone" class="text-xs font-semibold text-navy-800 block">Contact Phone Number</label>
        <input type="tel" id="phone" required placeholder="e.g. +234 803 123 4567" class="w-full bg-background border border-background-secondary rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-navy-800">
      </div>
      <div class="space-y-1">
        <label for="password" class="text-xs font-semibold text-navy-800 block">Password</label>
        <input type="password" id="password" required placeholder="Minimum 8 characters" class="w-full bg-background border border-background-secondary rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-navy-800">
      </div>

      <!-- Consent Checkbox -->
      <div class="flex items-start gap-2.5 py-1">
        <input type="checkbox" id="consent" required class="h-4 w-4 rounded border-background-secondary text-navy-900 focus:ring-navy-800 mt-0.5">
        <label for="consent" class="text-xs text-slate-500 leading-relaxed">
          I agree to the privacy statement and terms of school-to-school cluster network compliance.
        </label>
      </div>

      <!-- Action Button -->
      <button type="submit" class="w-full bg-navy-900 text-white font-medium py-3 rounded-lg hover:bg-navy-800 transition text-sm">
        Register Account
      </button>
    </form>

    <div class="border-t border-background-secondary pt-4 text-center text-xs">
      <p class="text-slate-500">
        Already have a proprietor account? <a href="login.html" class="text-navy-900 font-semibold hover:underline">Sign In</a>
      </p>
    </div>
  </div>
</body>
</html>
